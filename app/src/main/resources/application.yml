spring:
  application:
    name: mc-platform-backend
  profiles:
    default: local
  flyway:
    enabled: true
    locations: classpath:db/migration

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true

mcplatform:
  webauth:
    # Web-auth bridge tuning. TTL of link/reset tokens; per-(uuid, purpose) request cooldown; and the
    # expired-token purge interval (hygiene only — redemption already rejects expired tokens).
    token-ttl-minutes: 10
    token-cooldown-seconds: 60
    purge-interval-ms: 3600000
    # JWT-Login-Session (slice 004). Access = stateless HS256 (15 min); refresh = state-stored, rotating
    # (30 days). The HS256 secret MUST come from the environment (never committed); the app fails fast if
    # it is missing or shorter than 32 bytes. CORS allows exactly the web origin (credentialed cookie).
    access-ttl-minutes: 15
    refresh-ttl-days: 30
    refresh-purge-interval-ms: 3600000
    jwt:
      secret: ${MCWEB_JWT_SECRET:12345678901234567890123456789012}
    cors:
      allowed-origin: ${MCWEB_ORIGIN:http://localhost:3000}
    refresh-cookie:
      name: mcweb_refresh
      path: /api/web-auth/session

---
# Local development profile. Connection data comes from environment variables
# (see .env.example); docker-compose provides Postgres + Redis.
spring:
  config:
    activate:
      on-profile: local
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:mcplatform}
    username: ${DB_USER:mcplatform}
    password: ${DB_PASSWORD:mcplatform}

mcplatform:
  redis:
    host: ${REDIS_HOST:localhost}
    port: ${REDIS_PORT:6379}
    password: ${REDIS_PASSWORD:}

---
# Test profile. The smoke test supplies datasource + redis via Testcontainers
# (@DynamicPropertySource), so no static connection data is needed here.
spring:
  config:
    activate:
      on-profile: test
  flyway:
    enabled: true

mcplatform:
  webauth:
    jwt:
      # Test-only HS256 key (NOT a real secret) so the context loads under @ActiveProfiles("test").
      secret: test-only-hs256-secret-key-at-least-32-bytes-1234567890

